<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Archy × Daymaker — Delivery Operations</title>

  <!-- Vendor libraries (order matters: React → Babel → everything else) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://unpkg.com/maplibre-gl@5.1.0/dist/maplibre-gl.js"></script>

  <!-- Third-party stylesheets -->
  <link href="https://unpkg.com/maplibre-gl@5.1.0/dist/maplibre-gl.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>

  <!-- App stylesheet -->
  <link href="./src/styles.css" rel="stylesheet"/>
</head>
<body>
  <div id="root"></div>

  <!--
    React hook aliases. Declared here so every subsequent classic script
    (including the compiled <script type="text/babel"> files that
    babel-standalone injects) can reference useState/useEffect/etc. directly
    without having to destructure React inside every module.
  -->
  <script>
    const {useState, useMemo, useCallback, useRef, useEffect} = React;
  </script>

  <!-- Embedded route dataset (populates window.ROUTE_DATA) -->
  <script src="./data/routes.js"></script>

  <!-- Persistence layer (Supabase client + DB facade) -->
  <script src="./src/config/supabase.js"></script>

  <!-- Domain constants + pure utilities -->
  <script src="./src/constants.js"></script>
  <script src="./src/utils/format.js"></script>
  <script src="./src/utils/osrm.js"></script>
  <script src="./src/utils/geocode.js"></script>

  <!-- Rebalancing / VRP engine (dispatches to /vrp-worker.js) -->
  <script src="./src/engine/rebalance.js"></script>

  <!-- Map styling + marker factories (MapLibre helpers) -->
  <script src="./src/map/cake.js"></script>
  <script src="./src/map/clouds.js"></script>
  <script src="./src/map/markers.js"></script>

  <!--
    React components. Loaded as text/babel so babel-standalone compiles the
    JSX at runtime. Order matters: each component must be defined before any
    component that references it.
  -->
  <script type="text/babel" src="./src/components/ProgressBar.jsx"></script>
  <script type="text/babel" src="./src/components/StopCard.jsx"></script>
  <script type="text/babel" src="./src/components/DepotManager.jsx"></script>
  <script type="text/babel" src="./src/components/MapView.jsx"></script>
  <script type="text/babel" src="./src/components/PrintSheet.jsx"></script>
  <script type="text/babel" src="./src/components/OpsView.jsx"></script>
  <script type="text/babel" src="./src/components/CustomerView.jsx"></script>
  <script type="text/babel" src="./src/components/PhotosView.jsx"></script>
  <script type="text/babel" src="./src/components/App.jsx"></script>

  <!-- Mount the React tree -->
  <script type="text/babel">
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
