<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Archy × Daymaker — Delivery Operations</title>

  <!-- Vendor libraries (order matters: React → Babel → everything else) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://unpkg.com/maplibre-gl@5.1.0/dist/maplibre-gl.js"></script>

  <!-- Polygon draw tools + polygon math (Plan 2) -->
  <script src="https://unpkg.com/@mapbox/mapbox-gl-draw@1.4.3/dist/mapbox-gl-draw.js"></script>
  <script src="https://unpkg.com/@turf/turf@7/turf.min.js"></script>

  <!-- SheetJS for in-browser CSV/XLSX preview (Plan 3) -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <!-- Third-party stylesheets.
       NOTE: we load mapbox-gl.css for its `.mapboxgl-ctrl*` rules because
       mapbox-gl-draw wraps its buttons in `.mapboxgl-ctrl` (not MapLibre's
       `.maplibregl-ctrl`). Without this, the draw controls inherit the
       position-container's `pointer-events: none` and are unclickable. -->
  <link href="https://unpkg.com/maplibre-gl@5.1.0/dist/maplibre-gl.css" rel="stylesheet"/>
  <link href="https://unpkg.com/mapbox-gl@2.15.0/dist/mapbox-gl.css" rel="stylesheet"/>
  <link href="https://unpkg.com/@mapbox/mapbox-gl-draw@1.4.3/dist/mapbox-gl-draw.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>

  <!--
    Build-version cache-buster. Bump this whenever you edit local JS/JSX/CSS
    so the in-browser babel transformer doesn't serve stale cached scripts.
    The full local-asset URL set is rewritten with ?v=BUILD by a tiny inline
    helper below (see <script>__BUILD__</script>).
  -->
  <script>window.__BUILD__ = '20260419m';</script>

  <!-- App stylesheet -->
  <link href="./src/styles.css?v=20260419k" rel="stylesheet"/>
</head>
<body>
  <div id="root"></div>

  <!--
    React hook aliases. Declared here so every subsequent classic script
    (including the compiled <script type="text/babel"> files that
    babel-standalone injects) can reference useState/useEffect/etc. directly
    without having to destructure React inside every module.
  -->
  <script>
    const {useState, useMemo, useCallback, useRef, useEffect} = React;
  </script>

  <!-- Profile bootstrap (runs before supabase.js). Renders the landing picker
       into #root when no profile is selected and sets window.__CURRENT_PROFILE__
       + window.__PROFILE_GATE_ACTIVE__ for the scripts below. -->
  <script src="./src/config/profile.js?v=20260419k"></script>

  <!-- Hash router (depends on profile having been resolved) -->
  <script src="./src/config/router.js?v=20260419k"></script>

  <!-- Persistence layer (Supabase client + DB facade) -->
  <script src="./src/config/supabase.js?v=20260419k"></script>

  <!-- Multi-tenant facade (new) -->
  <script src="./src/config/db2.js?v=20260419k"></script>

  <!-- Admin data-access layer (Plan 2) -->
  <script src="./src/db/admin.js?v=20260419k"></script>

  <!-- Polygon overlap helper (Plan 2) -->
  <script src="./src/admin/overlap.js?v=20260419k"></script>

  <!-- Reassignment helper (Plan 2 follow-up) -->
  <script src="./src/admin/reassign.js?v=20260419k"></script>

  <!-- Upload helpers (Plan 3) -->
  <script src="./src/upload/parse.js?v=20260419k"></script>
  <script src="./src/upload/columns.js?v=20260419k"></script>

  <!-- Design helpers (Plan 5) -->
  <script src="./src/utils/design.js?v=20260419k"></script>
  <script src="./src/upload/crop.js?v=20260419k"></script>
  <script src="./src/utils/zip-prints.js?v=20260419k"></script>
  <script src="./src/utils/image-input.js?v=20260419k"></script>

  <!-- Customer-side data layer (Plan 3 + Plan 5 design helpers) -->
  <script src="./src/db/customer.js?v=20260419k"></script>

  <!-- Mapbox public token (browser-safe pk.*) -->
  <script src="./src/config/mapbox.js?v=20260419k"></script>

  <!-- Domain constants + pure utilities -->
  <script src="./src/constants.js?v=20260419k"></script>
  <script src="./src/utils/format.js?v=20260419k"></script>
  <script src="./src/utils/osrm.js?v=20260419k"></script>
  <script src="./src/utils/geocode.js?v=20260419k"></script>

  <!-- Archy → legacy-shape adapter (bridges new schema to existing components) -->
  <script src="./src/utils/archy-adapter.js?v=20260419k"></script>

  <!-- Rebalancing / VRP engine (dispatches to /vrp-worker.js) -->
  <script src="./src/engine/rebalance.js?v=20260419k"></script>

  <!-- Map styling + marker factories (MapLibre helpers) -->
  <script src="./src/map/cake.js?v=20260419k"></script>
  <script src="./src/map/clouds.js?v=20260419k"></script>
  <script src="./src/map/markers.js?v=20260419k"></script>

  <!--
    React components. Loaded as text/babel so babel-standalone compiles the
    JSX at runtime. Order matters: each component must be defined before any
    component that references it.
  -->
  <script type="text/babel" src="./src/components/ProgressBar.jsx?v=20260419k"></script>
  <script type="text/babel" src="./src/components/StopCard.jsx?v=20260419k"></script>
  <script type="text/babel" src="./src/components/DepotManager.jsx?v=20260419k"></script>
  <script type="text/babel" src="./src/components/MapView.jsx?v=20260419k"></script>
  <script type="text/babel" src="./src/components/PrintSheet.jsx?v=20260419k"></script>
  <script type="text/babel" src="./src/components/OpsView.jsx?v=20260419k"></script>
  <script type="text/babel" src="./src/components/CustomerView.jsx?v=20260419k"></script>
  <script type="text/babel" src="./src/components/PhotosView.jsx?v=20260419k"></script>

  <!-- Plan 2 views (depend on everything above) -->
  <script type="text/babel" src="./src/components/ProfileSwitcher.jsx?v=20260419k"></script>
  <script type="text/babel" src="./src/components/DeliveryAreaDraw.jsx?v=20260419k"></script>
  <script type="text/babel" src="./src/components/BakeryEditor.jsx?v=20260419k"></script>
  <script type="text/babel" src="./src/components/CustomerEditor.jsx?v=20260419k"></script>
  <script type="text/babel" src="./src/components/AdminView.jsx?v=20260419k"></script>
  <script type="text/babel" src="./src/components/BakeryHomeView.jsx?v=20260419k"></script>
  <script type="text/babel" src="./src/components/AddressTypeahead.jsx?v=20260419k"></script>
  <script type="text/babel" src="./src/components/CustomerHomeView.jsx?v=20260419k"></script>
  <script type="text/babel" src="./src/components/UploadWizard.jsx?v=20260419k"></script>

  <!-- Plan 5 design surfaces -->
  <script type="text/babel" src="./src/components/ImageCropper.jsx?v=20260419k"></script>
  <script type="text/babel" src="./src/components/DesignsStep.jsx?v=20260419k"></script>
  <script type="text/babel" src="./src/components/ProductionTab.jsx?v=20260419k"></script>
  <script type="text/babel" src="./src/components/BoxCardSheet.jsx?v=20260419k"></script>

  <!-- Route-aware app shell (depends on every component above) -->
  <script type="text/babel" src="./src/components/App.jsx?v=20260419k"></script>

  <!-- Mount the React tree (skip when the landing picker is showing) -->
  <script type="text/babel">
    if (!window.__PROFILE_GATE_ACTIVE__) {
      ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
    }
  </script>
</body>
</html>
